project_name: pi-mono
# source_location is defined in the active pipeline YAML. Do not duplicate it here.
pipeline: workflow/pipeline-full-with-deep-audit.yaml
# ^^^ To switch pipelines, change the line above AND adjust the phases below to match:
#   pipeline-full-with-deep-audit.yaml (default) → keep phases as-is (split defect scan)
#   pipeline-full-with-audit.yaml                → replace defect-scan-mechanical and defect-scan-semantic with a single defect-scan
#   pipeline.yaml                                → remove all defect-scan phases
#   pipeline-defect-scan.yaml                    → remove contracts through reimplementation-spec; collapse defect phases into a single defect-scan
#   pipeline-lite.yaml                           → remove all defect-scan phases, porting, and reimplementation-spec
#   pipeline-architecture-only.yaml              → keep only architecture
current_phase: protocols  # Set to "complete" when all phases are done.
last_updated: "2026-05-06"
# Schema for open_questions and carry_forward entries (see GUIDE.md "Open Questions vs Carry-Forward"):
#   open_questions: items that are still genuinely unknown (need a runtime test, maintainer decision, spec ruling).
#   carry_forward: items deferred to a specific later phase whose rubric is the right place to close them.
# Each entry is a mapping with keys: id, kind, description, deferred_reason
# carry_forward entries additionally carry: target_phase
# Allowed kinds: needs-runtime-test, needs-maintainer-decision, needs-spec-ruling,
#                defer-to-phase, needs-fixture-capture
phases:
  architecture:
    status: complete
    owner_notes:
      - "5 packages, ~282 source files, ~102K LOC TypeScript. Lockstep at 0.73.0."
      - "Two stable bases (pi-ai, pi-tui); pi-agent-core layered on pi-ai; pi-coding-agent + pi-web-ui as independent delivery shells. Build order tui→ai→agent→coding-agent→web-ui is load-bearing."
      - "Web-ui is Lit (not React); coding-agent does NOT depend on web-ui; auth precedence is 5-level resolved in coding-agent (pi-ai itself only reads env + Vertex ADC)."
    outputs_present:
      - findings/architecture/architecture-map.md
      - findings/public-surfaces/public-surfaces.md
      - findings/runtime-lifecycle/runtime-lifecycle.md
      - findings/state-and-storage/state-and-storage.md
      - findings/build-and-deploy/build-and-deploy.md
      - findings/config-model/config-model.md
    open_questions:
      - id: arch-OQ1
        kind: needs-runtime-test
        description: "Does the `pi` startup rg/fd auto-download fail gracefully (or block startup) when host is offline and binaries are absent?"
        deferred_reason: "Cannot determine from source alone; requires live boot in an offline VM."
      - id: arch-OQ2
        kind: needs-runtime-test
        description: "What happens when ~/.pi/agent/auth.json exists but is corrupt JSON — does pi start, prompt, or crash?"
        deferred_reason: "Auth resolver branches at auth-storage.ts:446-516 but parse-error path is not obvious from source."
      - id: arch-OQ3
        kind: needs-fixture-capture
        description: "Exact wire format of streamProxy SSE messages over /api/stream: data: {ProxyAssistantMessageEvent}\\n is documented but heartbeat/keepalive behavior unverified."
        deferred_reason: "Live capture against the running proxy is required."
    carry_forward:
      - id: arch-CF1
        kind: defer-to-phase
        target_phase: contracts
        description: "Tool surface contracts for the 7 built-in coding-agent tools (read, bash, edit, write, grep, find, ls) — parameter shapes, defaults, side-effect categories."
        deferred_reason: "Contracts phase rubric is the right place to spell out trigger/inputs/defaults/outputs/side-effects/error-behavior per tool."
      - id: arch-CF2
        kind: defer-to-phase
        target_phase: contracts
        description: "5-level auth precedence resolver (runtime override → api_key → oauth → env → fallback) deserves a contract row with security/auth-model treatment."
        deferred_reason: "Security & authorization is a contracts-phase rubric section."
      - id: arch-CF3
        kind: defer-to-phase
        target_phase: protocols
        description: "Detailed event catalog for AssistantMessageEvent (12 variants) — producer, consumer, transport, ordering, fields."
        deferred_reason: "Event-catalog production is the protocols phase's primary deliverable."
      - id: arch-CF4
        kind: defer-to-phase
        target_phase: protocols
        description: "JSONL session persistence format v3 — exact record schema, branch-edit rewrite semantics, replay rules."
        deferred_reason: "Persistent schema notes are a protocols-phase deliverable."
      - id: arch-CF5
        kind: defer-to-phase
        target_phase: protocols
        description: "TUI render protocol — synchronized output mode 2026, custom APC CURSOR_MARKER, diff strategy, width-change full-clear, Kitty/iTerm2 image escapes."
        deferred_reason: "Compatibility hazards are a protocols-phase rubric section."
      - id: arch-CF6
        kind: defer-to-phase
        target_phase: defect-scan-mechanical
        description: "photon WASM monkey-patch of fs.readFileSync (packages/coding-agent/src/utils/photon.ts) — global require-time mutation."
        deferred_reason: "Pass-6 environment-coupling rubric is the right framing."
      - id: arch-CF7
        kind: defer-to-phase
        target_phase: defect-scan-mechanical
        description: "undici bodyTimeout/headersTimeout: 0 at CLI startup (coding-agent/src/cli.ts:20) disables built-in safety mechanism globally."
        deferred_reason: "Pass-6 environment/config coupling."
      - id: arch-CF8
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "OpenAI-compatible URL-based compat-detection matrix (packages/ai/src/providers/openai-completions.ts:1030+) — deep semantic-pass-5 audit of contract violations across ~15 vendor branches."
        deferred_reason: "Pass-5 (API contract violations) is the right rubric; contracts/protocols context required."
      - id: arch-CF9
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "OAuth refresh races mitigated by proper-lockfile, but trust-boundary review of credential read/write paths (mode 0600 enforcement, fallback paths, parse-error handling) belongs in pass-4."
        deferred_reason: "Security & trust boundary is pass-4's rubric."
  defect-scan-mechanical:
    status: complete
    owner_notes:
      - "39 high/critical per-finding entries (22 Pass 1 logic, 11 Pass 2 error-handling incl. 2 critical data-loss findings, 6 Pass 6 config). Medium/low rolled to per-package tallies per user severity-cap policy."
      - "2 critical: (P2.1) non-atomic JSONL session writes can truncate on crash; (P2.2) edit/write tools overwrite user code with fs.writeFile (no temp+rename) — crash mid-write destroys files."
      - "Resolved arch-CF6 (photon WASM monkey-patch as P6.2) and arch-CF7 (undici timeouts as P6.1). Pre-emptively pre-routed P6.4 (resolveConfigValue !-prefix shell exec) to Pass 4 security."
      - "Surfaced new finding: rg/fd auto-download has no checksum/signature verification (supply-chain hazard, routed to Pass 4 as dsm-RT9)."
    outputs_present:
      - findings/defect-scan-mechanical/mechanical-defects.md
    open_questions:
      - id: dsm-OQ1
        kind: needs-runtime-test
        description: "Does Node escalate EPIPE on process.stdout.write mid-paint to uncaughtException, or silently drop? Affects 2.11 severity classification."
        deferred_reason: "Requires live runtime test."
      - id: dsm-OQ2
        kind: needs-runtime-test
        description: "Does appendFileSync produce short writes or full failures on ENOSPC mid-record? Affects 2.1 severity."
        deferred_reason: "Requires live disk-pressure test."
      - id: dsm-OQ3
        kind: needs-runtime-test
        description: "Bun-binary unhandled-rejection default behavior — Node 22 default is 'throw' in 15+; Bun may differ."
        deferred_reason: "Requires Bun runtime confirmation."
      - id: dsm-OQ4
        kind: needs-maintainer-decision
        description: "Policy: should an extension hook throwing stop the loop or always be logged-and-continued? Drives finding 1.13 severity."
        deferred_reason: "Maintainer policy call."
    carry_forward: []
  contracts:
    status: complete
    owner_notes:
      - "Resolved arch-CF1 (7 built-in tools), arch-CF2 (5-level auth precedence + auth model), dsm-RT5 (extension API contract incl. emitToolCall as the only unguarded hook), dsm-RT7 (Codex retry regex documented as the only retry surface). 18 black-box acceptance scenarios."
      - "Important corrections to architecture phase: streamProxy is a CLIENT not a server; Agent methods are prompt()/continue() not run(); listener registration is subscribe() not addListener; 22 lifecycle events (not ~25); state-anchor env var is PI_CODING_AGENT_DIR (ENV_AGENT_DIR is the source-internal constant name)."
      - "Surfaced new contract-drift open question (con-OQ3): streamSimple* synchronous throw on missing API key for Codex/Completions contradicts documented 'failures encoded in stream' contract. Routed to Pass 5 as con-CF6."
    outputs_present:
      - findings/contracts/behavioral-contracts.md
      - findings/public-surfaces/public-surfaces.md (append)
      - findings/runtime-lifecycle/runtime-lifecycle.md (append)
      - findings/state-and-storage/state-and-storage.md (append)
      - findings/config-model/config-model.md (append)
    open_questions:
      - id: con-OQ1
        kind: needs-runtime-test
        description: "pi-debug.log content audit — does it leak secrets / OAuth tokens?"
        deferred_reason: "Live runtime test required."
      - id: con-OQ2
        kind: needs-runtime-test
        description: "auth.json mode 0600 on Windows — does NTFS ACL behavior match POSIX intent?"
        deferred_reason: "Windows test required."
      - id: con-OQ3
        kind: needs-spec-ruling
        description: "Is streamSimple* synchronous throw on missing API key intentional pre-flight validation, or a contract drift from 'failures encoded in stream'?"
        deferred_reason: "Maintainer ruling needed; routed to Pass 5 as con-CF6."
      - id: con-OQ4
        kind: needs-maintainer-decision
        description: "Listener removal during fan-out iteration in agent.ts:539-541 — safe or undefined?"
        deferred_reason: "Maintainer policy."
      - id: con-OQ5
        kind: needs-spec-ruling
        description: "Extension API single-source-of-truth — should the 22 events be exported from one location instead of three (union type, on overloads, runner emit methods)?"
        deferred_reason: "Drift surface needing maintainer call."
    carry_forward:
      - id: con-CF5
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "dsm-RT1 covert-RCE via models.json !-prefix shell exec — Pass 4 framing reaffirmed by contracts."
        deferred_reason: "Already routed; reaffirmed."
      - id: con-CF6
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "streamSimple* sync-throw vs stream-error contract drift (con-OQ3); Pass 5 framing."
        deferred_reason: "Pass 5 (contract violations) rubric."
  protocols:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward:
      - id: arch-CF3
        kind: defer-to-phase
        target_phase: protocols
        description: "Detailed event catalog for AssistantMessageEvent (12 variants) — producer, consumer, transport, ordering, fields. Now also subsumes con-CF1 (contracts named the variants but did not pin field-level schema)."
        deferred_reason: "Event-catalog production is the protocols phase's primary deliverable."
      - id: arch-CF4
        kind: defer-to-phase
        target_phase: protocols
        description: "JSONL session persistence format v3 — exact record schema, branch-edit rewrite semantics, replay rules. Subsumes con-CF3 + dsm-RT6."
        deferred_reason: "Persistent schema notes are a protocols-phase deliverable."
      - id: arch-CF5
        kind: defer-to-phase
        target_phase: protocols
        description: "TUI render protocol — synchronized output mode 2026, custom APC CURSOR_MARKER, diff strategy, width-change full-clear, Kitty/iTerm2 image escapes."
        deferred_reason: "Compatibility hazards are a protocols-phase rubric section."
      - id: con-CF2
        kind: defer-to-phase
        target_phase: protocols
        description: "22-event extension catalog with handler-input-shape + return-semantics per event."
        deferred_reason: "Event catalog rubric."
      - id: con-CF4
        kind: defer-to-phase
        target_phase: protocols
        description: "streamProxy SSE wire framing (heartbeat/keepalive open question per arch-OQ3; data: <json>\\n vs canonical SSE \\n\\n)."
        deferred_reason: "Protocols phase wire-format rubric."
  defect-scan-semantic:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward:
      - id: dsm-RT1
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "resolveConfigValue !-prefix shell-exec wired into auth.json api_key and models.json headers — covert RCE via project-scoped <repo>/.pi/models.json. Pass 4 security framing."
        deferred_reason: "Pass 4 (security & trust) is the right rubric; mechanical phase resolved as P6.4 but full security treatment belongs here."
      - id: dsm-RT2
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Synchronous busy-wait in auth-storage.ts between proper-lockfile retries — concurrency lens."
        deferred_reason: "Pass 3 (concurrency) rubric."
      - id: dsm-RT3
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "migrateAuthToAuthJson does unlocked read-modify-write on settings.json, races proper-lockfile-protected SettingsManager."
        deferred_reason: "Pass 3 (concurrency) rubric."
      - id: dsm-RT4
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "getAttributionHeaders privacy review — PII / fingerprinting in outbound HTTP headers."
        deferred_reason: "Pass 4 (security & trust)."
      - id: dsm-RT9
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "rg/fd auto-download has no checksum/signature verification — supply-chain hazard. Tools execute as part of grep/find tools."
        deferred_reason: "Pass 4 (security & trust) supply-chain rubric."
      - id: dsm-RT10
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Codex retry loop has no jitter — concurrency angle (thundering-herd risk under multi-instance retry storms)."
        deferred_reason: "Pass 3 (concurrency) rubric."
      - id: dsm-RT11
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "streamProxy.processProxyEvent leaks partialJson accumulator into shallow-cloned ToolCall content (mechanical 1.14) — also a Pass 5 (API contract violation) of the published ProxyAssistantMessageEvent shape."
        deferred_reason: "Pass 5 needs the protocols-phase event catalog as ground truth before adjudicating contract violation."
      - id: arch-CF8
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "OpenAI-compatible URL-based compat-detection matrix (~15 vendor branches at packages/ai/src/providers/openai-completions.ts:1030+) — Pass 5 audit."
        deferred_reason: "Carried forward from architecture phase. Pass 5 rubric."
      - id: arch-CF9
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Trust-boundary review of credential read/write paths beyond the mode-0600 enforcement Pass 6 already confirmed (parse errors, fallback paths, OAuth refresh under high contention)."
        deferred_reason: "Carried forward from architecture phase. Pass 4 rubric."
  porting:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
  reimplementation-spec:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
next_actions:
