        description: "Behavior when terminal does not support `\\x1b[?2026` (no synchronized output) — fallback or text leak?"
        deferred_reason: "Terminal-capability test required."
      - id: pro-OQ5
        kind: needs-runtime-test
        description: "EPIPE on process.stdout.write mid-paint (defect 2.11) — uncaught warning or silent absorb?"
        deferred_reason: "Disconnect-mid-paint test required."
